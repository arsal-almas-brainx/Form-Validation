<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4 bg-primary">

    <div class="container border p-4 rounded bg-white shadow-sm">
        <h2 class="mb-4">Form Validation</h2>
        <form id="registrationForm" class="row g-3" novalidate>
            
            <div class="col-md-5">
                <label for="firstName" class="form-label">First Name:</label>
                <input type="text" class="form-control" id="firstName">
                <div class="invalid-feedback">First name is required.</div>
            </div>
            
            <div class="col-md-5">
                <label for="lastName" class="form-label">Last Name:</label>
                <input type="text" class="form-control" id="lastName">
                <div class="invalid-feedback">Last name is required.</div>
            </div>

            <div class="col-md-3">
                <label for="age" class="form-label">Age:</label>
                <input type="number" class="form-control" id="age">
                <div class="invalid-feedback">Must be between 18 and 151.</div>
            </div>

            <div class="col-md-7">
                <label for="contactNumber" class="form-label">Contact Number:</label>
                <input type="text" class="form-control" id="contactNumber">
                <div class="invalid-feedback">Required: Must be exactly 11 digits.</div>
            </div>

            <div class="col-md-10">
                <label for="emails" class="form-label">Notification Emails:</label>
                <textarea class="form-control" id="emails" rows="2"></textarea>
                <div class="form-text">Comma-separated emails.</div>
                <div class="invalid-feedback">Please enter valid email(s).</div>
            </div>

            <div class="col-md-5">
                <label for="password" class="form-label">Password:</label>
                <input type="password" class="form-control" id="password">
                <div class="invalid-feedback">8+ chars, Alphanumeric (1 Upper, 1 Lower, 1 Num).</div>
            </div>

            <div class="col-md-5">
                <label for="confirmPassword" class="form-label">Confirm Password:</label>
                <input type="password" class="form-control" id="confirmPassword">
                <div class="invalid-feedback">Passwords must match.</div>
            </div>

            <div class="col-4 mt-4">
                <button id="submitBtn" type="submit" class="btn btn-primary w-100" disabled>
                    Submit Registration
                </button>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
